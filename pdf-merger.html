<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF Merger</title>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --border: #2a2a3a;
    --accent: #00e5ff;
    --accent2: #7c3aed;
    --text: #e8e8f0;
    --muted: #5a5a7a;
    --success: #00ff88;
    --danger: #ff4466;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', 'Yu Gothic UI', 'Meiryo', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
    background-image:
      radial-gradient(ellipse at 20% 10%, rgba(124,58,237,0.15) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(0,229,255,0.08) 0%, transparent 50%);
  }

  header {
    text-align: center;
    margin-bottom: 48px;
  }

  header h1 {
    font-family: 'Courier New', 'Osaka-Mono', monospace;
    font-size: clamp(2rem, 5vw, 3.5rem);
    letter-spacing: -2px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  header p {
    color: var(--muted);
    font-size: 0.9rem;
    margin-top: 8px;
    font-weight: 300;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
    width: 100%;
    max-width: 680px;
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
  }

  .drop-zone {
    border: 2px dashed var(--border);
    border-radius: 12px;
    padding: 48px 24px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
  }

  .drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--accent);
    background: rgba(0,229,255,0.04);
  }

  .drop-zone input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }

  .drop-icon {
    font-size: 3rem;
    margin-bottom: 16px;
    display: block;
    filter: grayscale(0.5);
    pointer-events: none;
  }

  .drop-zone h3 {
    font-family: 'Courier New', 'Osaka-Mono', monospace;
    font-size: 1rem;
    color: var(--text);
    margin-bottom: 8px;
    pointer-events: none;
  }

  .drop-zone p {
    color: var(--muted);
    font-size: 0.82rem;
    pointer-events: none;
  }

  .file-list {
    margin-top: 24px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .file-item {
    display: flex;
    align-items: center;
    gap: 12px;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    transition: all 0.2s;
    animation: slideIn 0.2s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .file-item.drag-item { opacity: 0.4; }

  .drag-handle {
    color: var(--muted);
    cursor: grab;
    font-size: 1rem;
    user-select: none;
    flex-shrink: 0;
  }

  .drag-handle:active { cursor: grabbing; }

  .file-icon {
    color: var(--accent);
    font-size: 1.2rem;
    flex-shrink: 0;
  }

  .file-info {
    flex: 1;
    min-width: 0;
  }

  .file-name {
    font-family: 'Courier New', 'Osaka-Mono', monospace;
    font-size: 0.78rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--text);
  }

  .file-size {
    font-size: 0.72rem;
    color: var(--muted);
    margin-top: 2px;
  }

  .file-remove {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 1rem;
    padding: 4px;
    border-radius: 6px;
    transition: all 0.2s;
    flex-shrink: 0;
    line-height: 1;
  }

  .file-remove:hover { color: var(--danger); background: rgba(255,68,102,0.1); }

  .order-hint {
    font-size: 0.75rem;
    color: var(--muted);
    text-align: center;
    margin-top: 12px;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 14px 28px;
    border: none;
    border-radius: 10px;
    font-family: 'Courier New', 'Osaka-Mono', monospace;
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.2s ease;
    font-weight: 700;
    letter-spacing: 0.5px;
    width: 100%;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent), #0099cc);
    color: #000;
    box-shadow: 0 4px 20px rgba(0,229,255,0.25);
  }

  .btn-primary:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(0,229,255,0.4);
  }

  .btn-primary:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .progress-wrap {
    display: none;
    margin-top: 20px;
  }

  .progress-wrap.active { display: block; }

  .progress-label {
    display: flex;
    justify-content: space-between;
    font-family: 'Courier New', 'Osaka-Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .progress-bar {
    height: 4px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    border-radius: 99px;
    width: 0%;
    transition: width 0.3s ease;
  }

  .log {
    margin-top: 20px;
    background: rgba(0,0,0,0.4);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    font-family: 'Courier New', 'Osaka-Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
    max-height: 150px;
    overflow-y: auto;
    display: none;
  }

  .log.active { display: block; }
  .log .log-ok { color: var(--success); }
  .log .log-err { color: var(--danger); }
  .log .log-info { color: var(--accent); }

  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 99px;
    font-family: 'Courier New', 'Osaka-Mono', monospace;
    font-size: 0.65rem;
    background: rgba(0,229,255,0.15);
    color: var(--accent);
    border: 1px solid rgba(0,229,255,0.2);
    margin-left: 8px;
    vertical-align: middle;
  }

  footer {
    color: var(--muted);
    font-size: 0.72rem;
    text-align: center;
    margin-top: 12px;
    font-family: 'Courier New', 'Osaka-Mono', monospace;
  }
</style>
</head>
<body>

<header>
  <h1>PDF MERGER</h1>
  <p>pdf-merger-js を使用 <span class="badge">Browser</span></p>
</header>

<div class="card">
  <div class="drop-zone" id="dropZone">
    <input type="file" accept=".pdf" multiple id="fileInput">
    <span class="drop-icon">📄</span>
    <h3>PDFをドロップ または クリックして選択</h3>
    <p>複数ファイルを選択可能。ドラッグで順番を変更できます。</p>
  </div>

  <div class="file-list" id="fileList"></div>
  <p class="order-hint" id="orderHint" style="display:none">↕ ドラッグで順番を並び替えできます</p>
</div>

<div class="card">
  <button class="btn btn-primary" id="mergeBtn" disabled>
    ⬇ PDFを結合してダウンロード
  </button>

  <div class="progress-wrap" id="progressWrap">
    <div class="progress-label">
      <span id="progressText">処理中...</span>
      <span id="progressPct">0%</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  </div>

  <div class="log" id="log"></div>
</div>

<footer>すべての処理はブラウザ内で行われます。ファイルはサーバーにアップロードされません。</footer>

<script type="module">
// ============================================================
//  PDF Merger using pdf-merger-js
//  Using unpkg CDN: https://unpkg.com/pdf-merger-js@4.3.0/dist/index.js
// ============================================================

let PDFMerger = null;

// ライブラリの動的インポート
try {
  const module = await import('https://cdn.jsdelivr.net/npm/pdf-merger-js@5.1.2/+esm');
  PDFMerger = module.default || module.PDFMerger || module;
  console.log('PDFMerger loaded successfully:', PDFMerger);
} catch (e) {
  console.error('Failed to load PDFMerger:', e);
}

const fileInput = document.getElementById('fileInput');
const dropZone = document.getElementById('dropZone');
const fileListEl = document.getElementById('fileList');
const mergeBtn = document.getElementById('mergeBtn');
const orderHint = document.getElementById('orderHint');
const progressWrap = document.getElementById('progressWrap');
const progressFill = document.getElementById('progressFill');
const progressText = document.getElementById('progressText');
const progressPct = document.getElementById('progressPct');
const logEl = document.getElementById('log');

let files = []; // { file, name, size }

// ---- デバッグ用 ----
console.log('Script loaded, PDFMerger:', PDFMerger);

// ---- ドラッグ＆ドロップ ----
dropZone.addEventListener('dragover', e => { 
  e.preventDefault(); 
  dropZone.classList.add('drag-over'); 
});

dropZone.addEventListener('dragleave', () => {
  dropZone.classList.remove('drag-over');
});

dropZone.addEventListener('drop', e => {
  e.preventDefault();
  e.stopPropagation();
  console.log('Drop event:', e.dataTransfer.files);
  dropZone.classList.remove('drag-over');
  const pdfFiles = [...e.dataTransfer.files].filter(f => 
    f.type === 'application/pdf' || f.name.toLowerCase().endsWith('.pdf')
  );
  console.log('Filtered PDF files:', pdfFiles);
  if (pdfFiles.length > 0) {
    addFiles(pdfFiles);
  }
});

fileInput.addEventListener('change', (e) => { 
  console.log('File input change:', fileInput.files);
  if (fileInput.files.length > 0) {
    addFiles([...fileInput.files]); 
  }
  fileInput.value = ''; 
});

function addFiles(newFiles) {
  console.log('Adding files:', newFiles);
  const pdfFiles = newFiles.filter(f => 
    f.type === 'application/pdf' || f.name.toLowerCase().endsWith('.pdf')
  );
  pdfFiles.forEach(f => files.push({ file: f, name: f.name, size: f.size }));
  console.log('Current files:', files);
  renderList();
}

function renderList() {
  console.log('Rendering list, files count:', files.length);
  fileListEl.innerHTML = '';
  files.forEach((item, i) => {
    const el = document.createElement('div');
    el.className = 'file-item';
    el.draggable = true;
    el.dataset.index = i;
    el.innerHTML = `
      <span class="drag-handle" title="ドラッグして並び替え">⠿</span>
      <span class="file-icon">📄</span>
      <div class="file-info">
        <div class="file-name">${escHtml(item.name)}</div>
        <div class="file-size">${(item.size / 1024).toFixed(1)} KB</div>
      </div>
      <button class="file-remove" data-i="${i}" title="削除">✕</button>
    `;
    fileListEl.appendChild(el);
  });
  setupDragSort();
  fileListEl.querySelectorAll('.file-remove').forEach(btn => {
    btn.addEventListener('click', () => { 
      files.splice(+btn.dataset.i, 1); 
      renderList(); 
    });
  });
  mergeBtn.disabled = files.length < 2;
  orderHint.style.display = files.length >= 2 ? '' : 'none';
}

// ---- ドラッグで並び替え ----
let dragSrc = null;
function setupDragSort() {
  fileListEl.querySelectorAll('.file-item').forEach(item => {
    item.addEventListener('dragstart', e => { 
      dragSrc = item; 
      item.classList.add('drag-item'); 
      e.dataTransfer.effectAllowed = 'move'; 
    });
    item.addEventListener('dragend', () => { 
      dragSrc = null; 
      document.querySelectorAll('.file-item').forEach(i => i.classList.remove('drag-item')); 
    });
    item.addEventListener('dragover', e => { 
      e.preventDefault(); 
      e.dataTransfer.dropEffect = 'move'; 
    });
    item.addEventListener('drop', e => {
      e.preventDefault();
      if (!dragSrc || dragSrc === item) return;
      const from = +dragSrc.dataset.index;
      const to = +item.dataset.index;
      const tmp = files.splice(from, 1)[0];
      files.splice(to, 0, tmp);
      renderList();
    });
  });
}

function escHtml(s) { 
  return s.replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c])); 
}

// ---- ログ出力 ----
function log(msg, cls = '') {
  logEl.classList.add('active');
  const line = document.createElement('div');
  if (cls) line.className = cls;
  line.textContent = '> ' + msg;
  logEl.appendChild(line);
  logEl.scrollTop = logEl.scrollHeight;
}

function setProgress(pct, label) {
  progressFill.style.width = pct + '%';
  progressPct.textContent = pct + '%';
  if (label) progressText.textContent = label;
}

// ============================================================
//  PDF 結合処理（pdf-merger-js使用）
// ============================================================

async function mergePDFs(fileItems) {
  if (!PDFMerger) {
    throw new Error('PDFMergerライブラリが読み込まれていません。ページを再読み込みしてください。');
  }

  log('PDF結合を開始します', 'log-info');
  setProgress(10, '初期化中...');

  const merger = new PDFMerger();

  for (let i = 0; i < fileItems.length; i++) {
    const item = fileItems[i];
    const progress = 20 + Math.round((i / fileItems.length) * 60);
    setProgress(progress, `読み込み中: ${item.name}`);
    log(`[${i + 1}/${fileItems.length}] 読み込み: ${item.name}`);

    try {
      const arrayBuffer = await item.file.arrayBuffer();
      await merger.add(arrayBuffer);
      log(`  → 追加完了`, 'log-ok');
    } catch (e) {
      log(`  ✗ エラー: ${e.message}`, 'log-err');
      throw new Error(`${item.name} の追加に失敗: ${e.message}`);
    }
  }

  setProgress(90, 'PDFを生成中...');
  log('結合したPDFを生成しています...', 'log-info');

  try {
    const mergedPdf = await merger.saveAsBuffer();
    setProgress(100, '完成！');
    log('結合完了！', 'log-ok');
    return mergedPdf;
  } catch (e) {
    log(`  ✗ 生成エラー: ${e.message}`, 'log-err');
    throw new Error(`PDF生成に失敗: ${e.message}`);
  }
}

// ============================================================
//  UI イベント
// ============================================================
mergeBtn.addEventListener('click', async () => {
  if (!PDFMerger) {
    alert('PDFMergerライブラリが読み込まれていません。ページを再読み込みしてください。');
    return;
  }

  mergeBtn.disabled = true;
  logEl.innerHTML = '';
  logEl.classList.add('active');
  progressWrap.classList.add('active');
  setProgress(0, '準備中...');

  try {
    const result = await mergePDFs(files);
    const blob = new Blob([result], { type: 'application/pdf' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'merged.pdf';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 10000);
    log(`✓ ダウンロード開始 (${(result.length / 1024).toFixed(1)} KB)`, 'log-ok');
  } catch (e) {
    log('エラー: ' + e.message, 'log-err');
    console.error(e);
    alert('エラーが発生しました: ' + e.message);
  } finally {
    mergeBtn.disabled = files.length < 2;
  }
});
</script>
</body>
</html>
